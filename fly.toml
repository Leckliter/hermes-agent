# fly.toml app configuration file generated for hermes-agent-ffqymw on 2026-06-27T17:31:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hermes-agent-ffqymw'
primary_region = 'ord'

[build]

[[mounts]]
  source = 'data'
  destination = '/opt/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
